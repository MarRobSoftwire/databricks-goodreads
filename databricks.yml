bundle:
  name: goodreads_bundle

variables:
  notebook_runner_sp:
    description: Application ID of the service principal used to run job notebooks
    default: 80b13c62-20b3-46bf-8000-e66aba8f9634
  sql_warehouse_id:
    description: SQL warehouse ID for the Goodreads app (override per target/workspace if needed)
    default: b5e8bae3847f4c31

resources:
  jobs:
    books_job:
      name: goodreads-books-job
      run_as:
        service_principal_name: ${var.notebook_runner_sp}
      tasks:
        - task_key: bronze_books
          notebook_task:
            notebook_path: ./notebooks/goodreads_bronze.py
        - task_key: silver_books
          depends_on:
            - task_key: bronze_books
          notebook_task:
            notebook_path: ./notebooks/goodreads_silver.py
        - task_key: run_pages_job
          depends_on:
            - task_key: silver_books
          run_job_task:
            job_id: ${resources.jobs.pages_job.id}

    open_library_job:
      name: goodreads-open-library-job
      run_as:
        service_principal_name: ${var.notebook_runner_sp}
      tasks:
        - task_key: bronze_open_library
          notebook_task:
            notebook_path: ./notebooks/goodreads_bronze_open_library.py
        - task_key: silver_open_library
          depends_on:
            - task_key: bronze_open_library
          notebook_task:
            notebook_path: ./notebooks/goodreads_silver_open_library.py
        - task_key: gold_genre
          depends_on:
            - task_key: silver_open_library
          notebook_task:
            notebook_path: ./notebooks/goodreads_gold_genre.py

    pages_job:
      name: goodreads-pages-job
      run_as:
        service_principal_name: ${var.notebook_runner_sp}
      tasks:
        - task_key: bronze_review_pages
          notebook_task:
            notebook_path: ./notebooks/goodreads_bronze_pages.py
        - task_key: silver_review_pages
          depends_on:
            - task_key: bronze_review_pages
          notebook_task:
            notebook_path: ./notebooks/goodreads_silver_pages.py
        - task_key: gold_pages_per_day
          depends_on:
            - task_key: silver_review_pages
          notebook_task:
            notebook_path: ./notebooks/goodreads_gold_pages_per_day.py

  apps:
    goodreads_app:
      name: 'goodreads-app'
      source_code_path: app
      description: 'A goodreads dashboard'
      # Resources declared here are applied by `bundle deploy`.
      # The deploy workflow then upserts any extras the bundle schema cannot express
      # (e.g. UC TABLE securables) — see .github/workflows/deploy.yml.
      resources:
        - name: sql_warehouse
          sql_warehouse:
            id: ${var.sql_warehouse_id}
            permission: CAN_USE
        - name: pages_job
          description: 'Pages re-ingestion job'
          job:
            id: ${resources.jobs.pages_job.id}
            permission: CAN_MANAGE_RUN
        # UC TABLE resources: not expressible in bundle YAML — see
        # deploy/databricks-app-uc-resources.json and deploy.yml "Patch app UC table resource".

targets:
  dev:
    default: true
    workspace:
      host: https://dbc-8ae6cd44-6b5a.cloud.databricks.com
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
  # prod target is not currently in use - kept as an example of a multi-target setup
  # root_path and permissions would need updating before use
  prod:
    mode: production
    workspace:
      host: https://dbc-8ae6cd44-6b5a.cloud.databricks.com
      root_path: /Workspace/Users/someone@example.com/.bundle/${bundle.name}/${bundle.target}
    permissions:
      - user_name: someone@example.com
        level: CAN_MANAGE

