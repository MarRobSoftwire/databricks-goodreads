bundle:
  name: goodreads_bundle

resources:
  jobs:
    pages_job:
      name: goodreads-pages-job
      job_clusters:
        - job_cluster_key: main
          new_cluster:
            spark_version: 15.4.x-scala2.12
            node_type_id: m5.large
            num_workers: 0
            spark_conf:
              spark.master: "local[*, 4]"
              spark.databricks.cluster.profile: singleNode
            custom_tags:
              ResourceClass: SingleNode
      tasks:
        - task_key: bronze_review_pages
          job_cluster_key: main
          notebook_task:
            notebook_path: ./notebooks/goodreads_bronze_pages
        - task_key: silver_review_pages
          depends_on:
            - task_key: bronze_review_pages
          job_cluster_key: main
          notebook_task:
            notebook_path: ./notebooks/goodreads_silver_pages
        - task_key: gold_pages_per_day
          depends_on:
            - task_key: silver_review_pages
          job_cluster_key: main
          notebook_task:
            notebook_path: ./notebooks/goodreads_gold_pages_per_day

  apps:
    goodreads_app:
      name: 'goodreads-app'
      source_code_path: app
      description: 'A goodreads dashboard'
      resources:
        - name: sql_warehouse
          sql_warehouse:
            id: b5e8bae3847f4c31
            permission: CAN_USE

targets:
  dev:
    default: true
    workspace:
      host: https://dbc-8ae6cd44-6b5a.cloud.databricks.com
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
  # prod target is not currently in use - kept as an example of a multi-target setup
  # root_path and permissions would need updating before use
  prod:
    mode: production
    workspace:
      host: https://dbc-8ae6cd44-6b5a.cloud.databricks.com
      root_path: /Workspace/Users/someone@example.com/.bundle/${bundle.name}/${bundle.target}
    permissions:
      - user_name: someone@example.com
        level: CAN_MANAGE

