name: Initial Setup

on:
  workflow_dispatch:
    inputs:
      app_id:
        description: The existing Databricks app name to bind to (e.g. goodreads-app)
        required: true
        default: goodreads-app

jobs:
  setup:
    name: Bind bundle to existing app
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: databricks/setup-cli@main
      - name: Bind bundle resource to existing app
        run: databricks bundle deployment bind goodreads_app "${{ github.event.inputs.app_id }}"
        env:
          DATABRICKS_AUTH_TYPE: github-oidc
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_BUNDLE_ENV: prod
