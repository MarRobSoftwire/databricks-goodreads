name: Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  unit-tests:
    name: Run unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: pip install pytest beautifulsoup4 python-dateutil
      - name: Run tests
        run: pytest notebooks/ app/ -v
