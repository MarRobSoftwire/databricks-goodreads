name: Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  unit-tests:
    name: Run unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Run tests
        run: uv run --extra test pytest -v
