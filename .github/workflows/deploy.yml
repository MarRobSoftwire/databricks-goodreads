name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy bundle
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
      DATABRICKS_BUNDLE_ENV: dev
    steps:
      - uses: actions/checkout@v6
      - uses: databricks/setup-cli@main
      - name: Deploy bundle
        run: databricks bundle deploy
      - name: Deploy app
        run: |
          databricks apps deploy goodreads-app \
            --source-code-path "/Workspace/Shared/.bundle/goodreads_bundle/dev/files/app" \
            --mode SNAPSHOT
      # bundle deploy resets app resources to only what is declared in databricks.yml.
      # UC table resources (securable_type: TABLE) are not supported in the bundle
      # YAML schema — only VOLUME is supported via uc_securable
      # (https://docs.databricks.com/aws/en/dev-tools/bundles/resources#appresourcesuc_securable).
      # This step re-applies the UC table resource after every deploy via the REST API.
      # (https://docs.databricks.com/api/workspace/apps/update)
      - name: Patch app UC table resource
        run: |
          cat > /tmp/app-resources.json << EOF
          {
            "resources": [
              {"name": "sql_warehouse", "sql_warehouse": {"id": "b5e8bae3847f4c31", "permission": "CAN_USE"}},
              {"name": "uc_table", "uc_securable": {"securable_full_name": "${{ vars.UC_TABLE_NAME }}", "securable_type": "TABLE", "permission": "SELECT"}}
            ]
          }
          EOF
          databricks api patch /api/2.0/apps/goodreads-app --json @/tmp/app-resources.json
