name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy bundle
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
      DATABRICKS_BUNDLE_ENV: dev
    steps:
      - uses: actions/checkout@v6
      - uses: databricks/setup-cli@main
      - name: Deploy bundle
        run: databricks bundle deploy
      - name: Start app
        run: databricks apps start goodreads-app
      - name: Deploy app
        run: |
          databricks apps deploy goodreads-app \
            --source-code-path "/Workspace/Shared/.bundle/goodreads_bundle/dev/files/app" \
            --mode SNAPSHOT
      # bundle deploy resets app resources to only what is declared in databricks.yml.
      # UC table resources (securable_type: TABLE) are not supported in the bundle
      # YAML schema — only VOLUME is supported via uc_securable
      # (https://docs.databricks.com/aws/en/dev-tools/bundles/resources#appresourcesuc_securable).
      # This step fetches the resources already applied by bundle deploy, then upserts
      # the extras the bundle schema cannot express. databricks.yml is the single source
      # of truth for all bundle-manageable resources — this step only needs updating when
      # the UC TABLE extras list below changes.
      # (https://docs.databricks.com/api/workspace/apps/update)
      - name: Patch app UC table resource
        run: |
          CURRENT=$(databricks api get /api/2.0/apps/goodreads-app | jq '.resources // []')

          EXTRAS='[{"name":"pages_per_day_table","uc_securable":{"securable_full_name":"workspace.goodreads.gold_pages_per_day","securable_type":"TABLE","permission":"SELECT"}},{"name":"gold_genre_table","uc_securable":{"securable_full_name":"workspace.goodreads.gold_genre","securable_type":"TABLE","permission":"SELECT"}}]'

          MERGED=$(jq -n --argjson current "$CURRENT" --argjson extras "$EXTRAS" \
            '($current + $extras) | group_by(.name) | map(last)')

          databricks api patch /api/2.0/apps/goodreads-app --json "{\"resources\": $MERGED}"
